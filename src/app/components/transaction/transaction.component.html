<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  @for (col of columns; track col.key) {
    <ng-container [matColumnDef]="col.key">
      <th mat-header-cell *matHeaderCellDef [style.text-align]="col.align">{{ col.label }}</th>
      @if (col.key === 'status') {
        <td mat-cell *matCellDef="let row" [style.text-align]="col.align">
          <span class="inline-flex items-center rounded-full px-3 py-1 text-sm font-medium ring-1" [ngClass]="{
              'bg-green-100 text-green-700 ring-green-600/10': row.status === 'paid',
              'bg-red-100 text-red-700 ring-red-600/10': row.status === 'cancelled',
              'bg-yellow-50 text-yellow-600 ring-yellow-500/10': row.status === 'pending',
              'bg-gray-50 text-gray-600 ring-gray-500/10': row.status === 'refunded'
            }">
            {{ row[col.key] | titlecase }}
          </span>
        </td>
      }
      @else {
        <td mat-cell *matCellDef="let row" [style.text-align]="col.align">{{ row[col.key]  }}</td>
      }
    </ng-container>
  }
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
